name: Build openMHA ARMv7 (Cross Compile)

on:
  workflow_dispatch:

jobs:
  build-armv7:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build openMHA
        run: |
          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            -e DEBIAN_FRONTEND=noninteractive \
            ubuntu:20.04 \
            bash -c "
              set -e
              export DEBIAN_FRONTEND=noninteractive
              
              echo '=== 1. 安装交叉编译工具 ==='
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential \
                gcc-arm-linux-gnueabihf \
                g++-arm-linux-gnueabihf \
                libasound2-dev \
                libfftw3-dev \
                libsndfile1-dev \
                libeigen3-dev \
                make
              
              echo '=== 2. 创建 config.mk ==='
              cd /workspace
              cat > config.mk << 'EOF'
              PLATFORM = linux
              ARCH = armv7l
              PREFIX = /usr/local
              
              CC = arm-linux-gnueabihf-gcc
              CXX = arm-linux-gnueabihf-g++
              AR = arm-linux-gnueabihf-ar
              LD = arm-linux-gnueabihf-ld
              
              CFLAGS = -Wall -Werror -std=gnu11 -fPIC -O2 -march=armv7-a -mfloat-abi=hard -mfpu=neon
              CXXFLAGS = -Wall -Werror -std=c++17 -fPIC -O2 -march=armv7-a -mfloat-abi=hard -mfpu=neon -D_GLIBCXX_USE_CXX11_ABI=0
              
              WITH_JACK = no
              WITH_LSL = no
              WITH_OSC = no
              WITH_ALSA = yes
              WITH_EIGEN = yes
              
              CXXSTANDARD = c++17
              GCC_VER = -9
              BUILD_DIR = armv7l-linux-gcc-9
              EOF
              
              echo '=== 3. 修改 Makefile ==='
              # 备份原 Makefile
              cp Makefile Makefile.bak
              # 注释掉 include config.mk
              sed -i 's/^include config.mk/#include config.mk/' Makefile
              # 注释掉 config.mk 生成目标
              sed -i '/^config.mk:/,/^$/s/^/#/' Makefile
              
              echo '=== 4. 编译 ==='
              make -j\$(nproc)
              
              echo '=== 5. 安装 ==='
              make install DESTDIR=/workspace/install
              
              echo '=== 6. 验证 ==='
              file /workspace/install/usr/local/bin/mha || echo 'mha not found'
              ls -la /workspace/install/usr/local/bin/
            "

      - name: Package artifacts
        run: |
          if [ -d install/usr/local/bin ]; then
            cd install
            tar -czvf ../openMHA-armv7.tar.gz .
            cd ..
            echo "打包完成"
          else
            echo "错误: install 目录不存在"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openMHA-armv7
          path: openMHA-armv7.tar.gz
