name: Build openMHA for ARMv7

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-armv7:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            libasound2-dev \
            libfftw3-dev \
            libsndfile1-dev \
            libeigen3-dev \
            portaudio19-dev

      - name: Configure
        run: |
          chmod +x configure
          ./configure --without-lsl --without-jack --without-osc

      - name: Build
        run: |
          make -j$(nproc)

      - name: Install
        run: |
          mkdir -p install
          make install DESTDIR=$(pwd)/install

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openMHA-armv7
          path: install/
