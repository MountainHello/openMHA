name: Build openMHA with full dependencies

on:
  workflow_dispatch:

jobs:
  build-armv7:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout openMHA code
        uses: actions/checkout@v4

      - name: Build in Ubuntu 20.04 container
        run: |
          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            -e DEBIAN_FRONTEND=noninteractive \
            ubuntu:20.04 \
            bash -c "
              set -e
              export DEBIAN_FRONTEND=noninteractive
              
              echo '=== 1. 更新软件源 ==='
              apt-get update
              
              echo '=== 2. 安装基础依赖（包括 git）==='
              apt-get install -y --no-install-recommends \
                build-essential \
                git \
                wget \
                ca-certificates \
                libasound2-dev \
                libfftw3-dev \
                libsndfile1-dev \
                libeigen3-dev \
                libjack-jackd2-dev \
                liblo-dev \
                gcc-arm-linux-gnueabihf \
                g++-arm-linux-gnueabihf
              
              echo '=== 3. 升级 CMake 到 3.23+ ==='
              # 方法1：使用 pip 安装最新 CMake
              apt-get install -y python3-pip
              pip3 install --upgrade cmake
              export PATH=/root/.local/bin:\$PATH
              cmake --version
              
              echo '=== 4. 编译 liblsl (ARMv7) ==='
              cd /tmp
              git clone https://github.com/sccn/liblsl.git
              cd liblsl
              mkdir build && cd build
              cmake .. \
                -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc \
                -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++ \
                -DCMAKE_CXX_FLAGS='-D_GLIBCXX_USE_CXX11_ABI=0' \
                -DCMAKE_C_FLAGS='-march=armv7-a -mfloat-abi=hard' \
                -DCMAKE_INSTALL_PREFIX=/usr/local \
                -DBUILD_SHARED_LIBS=ON
              make -j\$(nproc)
              make install
              
              echo '=== 5. 验证 liblsl 安装 ==='
              ls -la /usr/local/lib/liblsl.so* || echo 'liblsl 安装失败'
              ls -la /usr/local/include/lsl_cpp.h || echo '头文件安装失败'
              
              echo '=== 6. 安装 ARM 架构的交叉依赖 ==='
              dpkg --add-architecture armhf
              apt-get update
              apt-get install -y --no-install-recommends \
                libasound2-dev:armhf \
                libfftw3-dev:armhf \
                libsndfile1-dev:armhf \
                libjack-jackd2-dev:armhf \
                liblo-dev:armhf
              
              echo '=== 7. 配置 openMHA 编译环境 ==='
              cd /workspace
              
              export CC=arm-linux-gnueabihf-gcc
              export CXX=arm-linux-gnueabihf-g++
              export PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig
              export CFLAGS='-march=armv7-a -mfloat-abi=hard -mfpu=neon'
              export CXXFLAGS='-march=armv7-a -mfloat-abi=hard -mfpu=neon -D_GLIBCXX_USE_CXX11_ABI=0'
              export LDFLAGS='-L/usr/lib/arm-linux-gnueabihf'
              
              echo '=== 8. 修改 configure 脚本 ==='
              chmod +x configure
              sed -i 's/check_jack/#check_jack/g' configure
              sed -i 's/check_osc/#check_osc/g' configure
              sed -i 's/ARCH=x86_64/ARCH=armv7l/g' configure
              
              echo '=== 9. 运行 configure ==='
              ./configure --host=arm-linux-gnueabihf \
                          --with-lsl \
                          --with-jack \
                          --with-osc
              
              echo '=== 10. 编译 openMHA ==='
              make -j\$(nproc)
              
              echo '=== 11. 安装到临时目录 ==='
              make install DESTDIR=/workspace/install
              
              echo '=== 编译完成 ==='
            "

      - name: Package artifacts
        run: |
          if [ -d install ]; then
            cd install
            tar -czvf ../openMHA-full-armv7.tar.gz .
            cd ..
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openMHA-full-armv7
          path: openMHA-full-armv7.tar.gz
