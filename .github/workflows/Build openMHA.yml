name: Build openMHA on ARMv7 (Native)

on:
  workflow_dispatch:

jobs:
  build-armv7:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build on ARMv7 Ubuntu 20.04
        run: |
          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            -e DEBIAN_FRONTEND=noninteractive \
            arm32v7/ubuntu:20.04 \
            bash -c "
              set -e
              export DEBIAN_FRONTEND=noninteractive
              
              # 使用国内源加速
              sed -i 's/ports.ubuntu.com/mirrors.aliyun.com/g' /etc/apt/sources.list
              apt-get update
              
              apt-get install -y --no-install-recommends \
                build-essential \
                cmake \
                git \
                libasound2-dev \
                libfftw3-dev \
                libsndfile1-dev \
                libeigen3-dev \
                libjack-jackd2-dev \
                liblo-dev
              
              # 编译 liblsl（注意：Ubuntu 20.04 的 CMake 版本较旧，可能需要升级）
              cd /tmp
              git clone https://github.com/sccn/liblsl.git
              cd liblsl
              mkdir build && cd build
              cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local -DBUILD_SHARED_LIBS=ON
              make -j\$(nproc)
              make install
              ldconfig
              
              # 编译 openMHA
              cd /workspace
              chmod +x configure
              ./configure --with-lsl --with-jack --with-osc
              make -j\$(nproc)
              make install DESTDIR=/workspace/install
            "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openMHA-armv7
          path: install/
