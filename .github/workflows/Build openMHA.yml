name: Build openMHA on ARMv7 (QEMU)

on:
  workflow_dispatch:

jobs:
  build-armv7:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm32v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build on ARMv7 Ubuntu 20.04
        run: |
          docker run --rm \
            --platform linux/arm/v7 \
            -v $(pwd):/workspace \
            -w /workspace \
            -e DEBIAN_FRONTEND=noninteractive \
            arm32v7/ubuntu:20.04 \
            bash -c "
              set -e
              export DEBIAN_FRONTEND=noninteractive
              
              echo '=== 1. 更新软件源 ==='
              sed -i 's/ports.ubuntu.com/mirrors.aliyun.com/g' /etc/apt/sources.list
              apt-get update
              
              echo '=== 2. 安装编译依赖 ==='
              apt-get install -y --no-install-recommends \
                build-essential \
                cmake \
                git \
                libasound2-dev \
                libfftw3-dev \
                libsndfile1-dev \
                libeigen3-dev \
                libjack-jackd2-dev \
                liblo-dev \
                ca-certificates
              
              echo '=== 3. 升级 CMake（因为 liblsl 需要 3.23+）==='
              apt-get install -y python3-pip
              pip3 install --upgrade cmake
              export PATH=/root/.local/bin:\$PATH
              cmake --version
              
              echo '=== 4. 编译 liblsl ==='
              cd /tmp
              git clone https://github.com/sccn/liblsl.git
              cd liblsl
              mkdir build && cd build
              cmake .. \
                -DCMAKE_INSTALL_PREFIX=/usr/local \
                -DBUILD_SHARED_LIBS=ON
              make -j\$(nproc)
              make install
              ldconfig
              
              echo '=== 5. 验证 liblsl ==='
              ls -la /usr/local/lib/liblsl.so*
              
              echo '=== 6. 编译 openMHA ==='
              cd /workspace
              chmod +x configure
              # 修改 configure 脚本
              sed -i 's/check_jack/#check_jack/g' configure
              sed -i 's/check_osc/#check_osc/g' configure
              sed -i 's/ARCH=x86_64/ARCH=armv7l/g' configure
              
              # 运行 configure
              ./configure --with-lsl --with-jack --with-osc
              
              # 编译
              make -j\$(nproc)
              
              # 安装到临时目录
              make install DESTDIR=/workspace/install
              
              echo '=== 编译完成 ==='
              ls -la /workspace/install/usr/local/bin/
            "

      - name: Package artifacts
        run: |
          if [ -d install ]; then
            cd install
            tar -czvf ../openMHA-armv7-full.tar.gz .
            cd ..
          else
            echo "install 目录不存在，尝试查找产物位置"
            find . -name "mha" -type f 2>/dev/null || echo "未找到 mha"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openMHA-armv7-full
          path: openMHA-armv7-full.tar.gz
