name: Build openMHA for ARMv7 with LSL

on:
  workflow_dispatch:

env:
  TARGET_HOST: arm-linux-gnueabihf
  COMPAT_FLAGS: -D_GLIBCXX_USE_CXX11_ABI=0

jobs:
  build-openmha:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install toolchain and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            wget \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            libasound2-dev \
            libfftw3-dev \
            libsndfile1-dev \
            libeigen3-dev \
            libtool \
            automake \
            autoconf

      - name: Build liblsl for ARMv7
        run: |
          echo "=== Building liblsl ==="
          cd /tmp
          git clone https://github.com/sccn/liblsl.git
          cd liblsl
          mkdir build && cd build
          cmake .. \
            -DCMAKE_C_COMPILER=${TARGET_HOST}-gcc \
            -DCMAKE_CXX_COMPILER=${TARGET_HOST}-g++ \
            -DCMAKE_CXX_FLAGS="${COMPAT_FLAGS}" \
            -DCMAKE_C_FLAGS="-march=armv7-a -mfloat-abi=hard -mfpu=neon" \
            -DCMAKE_INSTALL_PREFIX=/usr/${TARGET_HOST}
          make -j$(nproc)
          sudo make install
          echo "liblsl installed"

      - name: Prepare openMHA build (skip external_libs)
        run: |
          cd ${{ github.workspace }}
          
          # 修改 Makefile，跳过 external_libs 编译
          sed -i 's/^external_libs:.*/external_libs:/' Makefile
          sed -i '/^external_libs:/,/^$/c\external_libs:\n\t@echo "Skipping external_libs compilation"' Makefile
          
          # 创建 config.mk
          cat > config.mk << 'EOF'
          PLATFORM = linux
          ARCH = armv7l
          PREFIX = /usr/local
          
          CC = arm-linux-gnueabihf-gcc
          CXX = arm-linux-gnueabihf-g++
          AR = arm-linux-gnueabihf-ar
          LD = arm-linux-gnueabihf-ld
          
          CFLAGS = -Wall -Werror -std=gnu11 -fPIC -O2 -march=armv7-a -mfloat-abi=hard -mfpu=neon -g
          CXXFLAGS = -Wall -Werror -std=c++17 -fPIC -O2 -march=armv7-a -mfloat-abi=hard -mfpu=neon ${COMPAT_FLAGS} -g
          LDFLAGS = -L/usr/${TARGET_HOST}/lib
          CPPFLAGS = -I/usr/${TARGET_HOST}/include
          
          WITH_LSL = yes
          WITH_JACK = no
          WITH_OSC = no
          WITH_ALSA = yes
          WITH_EIGEN = yes
          
          CXXSTANDARD = c++17
          GCC_VER = -9
          BUILD_DIR = armv7l-linux-gcc-9
          EOF
          
          # 修改 Makefile 包含我们的 config.mk
          echo "include config.mk" >> Makefile

      - name: Build openMHA
        run: |
          cd ${{ github.workspace }}
          
          # 编译 mha 库
          cd mha
          make -j$(nproc)
          cd ..
          
          # 编译主程序
          make -j$(nproc) mha

      - name: Install to staging directory
        run: |
          cd ${{ github.workspace }}
          mkdir -p install/usr/local/bin install/usr/local/lib
          
          # 复制二进制文件
          cp -r mha/*.so* install/usr/local/lib/ 2>/dev/null || true
          cp mha install/usr/local/bin/ 2>/dev/null || true
          cp mha*.so* install/usr/local/lib/ 2>/dev/null || true
          
          # 查找并复制 mha 可执行文件
          find . -name "mha" -type f -executable -exec cp {} install/usr/local/bin/ \;
          
          echo "=== Installed files ==="
          ls -la install/usr/local/bin/
          ls -la install/usr/local/lib/

      - name: Package artifacts
        run: |
          cd ${{ github.workspace }}/install
          tar -czvf ../openMHA-armv7-lsl.tar.gz .
          cd ..
          echo "✅ Artifact created: openMHA-armv7-lsl.tar.gz"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openMHA-armv7-with-lsl
          path: openMHA-armv7-lsl.tar.gz
