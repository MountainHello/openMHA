name: Build openMHA for ARMv7 (Ubuntu 20.04 compatible)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-armv7:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cross compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            libasound2-dev \
            libfftw3-dev \
            libsndfile1-dev \
            libeigen3-dev \
            make \
            file

      - name: Modify configure script for cross compilation
        run: |
          chmod +x configure
          # 禁用可选库检查
          sed -i 's/check_jack/#check_jack/g' configure
          sed -i 's/check_lsl/#check_lsl/g' configure
          sed -i 's/check_osc/#check_osc/g' configure

      - name: Configure for ARMv7
        run: |
          ./configure --host=arm-linux-gnueabihf \
                      --without-lsl \
                      --without-jack \
                      --without-osc \
                      CXXFLAGS="-D_GLIBCXX_USE_CXX11_ABI=0" \
                      CFLAGS="-march=armv7-a -mfloat-abi=hard"

      - name: Build
        run: |
          make -j$(nproc)

      - name: Install to temporary directory
        run: |
          make install DESTDIR=$(pwd)/install

      - name: Verify compatibility
        run: |
          echo "=== 架构验证 ==="
          file install/usr/local/bin/mha || echo "mha not found"
          echo ""
          echo "=== GLIBC 版本检查 ==="
          arm-linux-gnueabihf-readelf -V install/usr/local/bin/mha | grep GLIBC || echo "无 GLIBC 依赖"

      - name: Package artifacts
        run: |
          cd install
          tar -czvf ../openMHA-armv7-ubuntu20.tar.gz .
          cd ..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openMHA-armv7-ubuntu20
          path: openMHA-armv7-ubuntu20.tar.gz
