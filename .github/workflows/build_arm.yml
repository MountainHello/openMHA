name: Build openMHA for ARMv7

on:
  workflow_dispatch:

jobs:
  build-armv7:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cross compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            libasound2-dev \
            libfftw3-dev \
            libsndfile1-dev \
            libeigen3-dev \
            make

      - name: Modify configure script for ARM cross compilation
        run: |
          chmod +x configure
          # 禁用可选库检查
          sed -i 's/check_jack/#check_jack/g' configure
          sed -i 's/check_lsl/#check_lsl/g' configure
          sed -i 's/check_osc/#check_osc/g' configure
          # 强制设置架构为 ARM
          sed -i 's/^ARCH=.*$/ARCH=armv7l/' configure
          # 修改编译器为交叉编译器
          sed -i 's/CC=gcc/CC=arm-linux-gnueabihf-gcc/g' configure
          sed -i 's/CXX=g++/CXX=arm-linux-gnueabihf-g++/g' configure
          sed -i 's/cc=gcc/cc=arm-linux-gnueabihf-gcc/g' configure
          sed -i 's/cxx=g++/cxx=arm-linux-gnueabihf-g++/g' configure
          # 修改 SSE 选项为 ARM NEON
          sed -i 's/-msse -msse2 -mfpmath=sse/-mcpu=cortex-a8 -mfloat-abi=hard -mfpu=neon/g' configure

      - name: Run configure
        run: |
          ./configure --without-lsl --without-jack --without-osc

      - name: Build
        run: |
          make -j$(nproc)

      - name: Install
        run: |
          make install DESTDIR=$(pwd)/install

      - name: Package artifacts
        run: |
          cd install
          tar -czvf ../openMHA-armv7.tar.gz .
          cd ..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openMHA-armv7
          path: openMHA-armv7.tar.gz
