name: Build openMHA for ARMv7 (Direct Make)

on:
  workflow_dispatch:

jobs:
  build-armv7:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build in Ubuntu 20.04 container
        run: |
          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            -e DEBIAN_FRONTEND=noninteractive \
            ubuntu:20.04 \
            bash -c "
              set -e
              export DEBIAN_FRONTEND=noninteractive
              
              # 1. 安装必要的依赖和交叉编译工具链
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential \
                gcc-arm-linux-gnueabihf \
                g++-arm-linux-gnueabihf \
                libasound2-dev \
                libfftw3-dev \
                libsndfile1-dev \
                libeigen3-dev \
                make
              
              # 2. 手动编译 external_libs 中的 FFTW 库（可选，但为了完整性）
              echo '=== 编译 external_libs ==='
              cd /workspace/external_libs
              # 只编译 fftw-2.1.5，跳过其他
              if [ -d fftw-2.1.5 ]; then
                cd fftw-2.1.5
                ./configure --host=arm-linux-gnueabihf --enable-shared --prefix=/usr/local/arm-linux-gnueabihf
                make -j\$(nproc)
                make install
                cd ..
              fi
              
              # 3. 直接调用 make，绕过 configure 脚本
              echo '=== 编译 openMHA ==='
              cd /workspace
              
              # 设置关键的环境变量
              export CC=arm-linux-gnueabihf-gcc
              export CXX=arm-linux-gnueabihf-g++
              export AR=arm-linux-gnueabihf-ar
              export LD=arm-linux-gnueabihf-ld
              
              # 定义编译和链接标志
              export CFLAGS='-march=armv7-a -mfloat-abi=hard -mfpu=neon'
              export CXXFLAGS='-march=armv7-a -mfloat-abi=hard -mfpu=neon -D_GLIBCXX_USE_CXX11_ABI=0'
              export LDFLAGS='-L/usr/local/arm-linux-gnueabihf/lib'
              
              # 使用 -e 参数让 make 忽略 configure 生成的不正确 Makefile
              # 强制指定目标，并传递我们手动设置的变量
              make -e -j\$(nproc) \
                ARCH=armv7l \
                CROSS_COMPILE=arm-linux-gnueabihf- \
                WITH_JACK=no \
                WITH_LSL=no \
                WITH_OSC=no
              
              # 4. 安装到临时目录
              make install DESTDIR=/workspace/install
              
              echo '=== 编译完成 ==='
            "

      - name: Package artifacts
        run: |
          cd install
          tar -czvf ../openMHA-armv7.tar.gz .
          cd ..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openMHA-armv7
          path: openMHA-armv7.tar.gz
