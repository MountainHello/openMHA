name: Build openMHA for ARMv7 (Ubuntu 20.04)

on:
  workflow_dispatch:

jobs:
  build-armv7:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build in Ubuntu 20.04 container
        run: |
          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            -e DEBIAN_FRONTEND=noninteractive \
            ubuntu:20.04 \
            bash -c "
              set -e
              
              export DEBIAN_FRONTEND=noninteractive
              
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential \
                libasound2-dev \
                libfftw3-dev \
                libsndfile1-dev \
                libeigen3-dev \
                make \
                ca-certificates
              
              chmod +x configure
              sed -i 's/check_jack/#check_jack/g' configure
              sed -i 's/check_lsl/#check_lsl/g' configure
              sed -i 's/check_osc/#check_osc/g' configure
              
              ./configure --without-lsl --without-jack --without-osc
              make -j\$(nproc)
              make install DESTDIR=\$(pwd)/install
              
              # 确保目录存在
              mkdir -p /workspace/artifacts
              
              # 复制编译产物到 workspace（避免 tar 读取变化中的目录）
              cp -r install/* /workspace/artifacts/
              
              echo "编译完成，产物已复制到 /workspace/artifacts"
            "

      - name: Package artifacts
        run: |
          cd artifacts
          tar -czvf ../openMHA-armv7.tar.gz .
          cd ..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openMHA-armv7
          path: openMHA-armv7.tar.gz
