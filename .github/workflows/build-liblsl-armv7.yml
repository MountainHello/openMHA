name: Build ARMv7 for Ubuntu 20.04

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-armv7:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cross compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            cmake \
            make \
            file

      - name: Configure with CMake
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc \
            -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++ \
            -DCMAKE_INSTALL_PREFIX=./install \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_CXX_FLAGS="-D_GLIBCXX_USE_CXX11_ABI=0 -march=armv7-a -mfloat-abi=hard -mfpu=neon" \
            -DCMAKE_C_FLAGS="-march=armv7-a -mfloat-abi=hard -mfpu=neon"

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: Install
        run: |
          cd build
          make install

      - name: Verify compatibility
        run: |
          echo "=== 架构验证 ==="
          file build/install/lib/liblsl.so
          echo ""
          echo "=== GLIBC 版本检查（应该没有 2.33+）==="
          readelf -V build/install/lib/liblsl.so | grep GLIBC || echo "无 GLIBC 依赖"
          echo ""
          echo "=== 需要的动态库 ==="
          arm-linux-gnueabihf-readelf -d build/install/lib/liblsl.so | grep NEEDED

      - name: Package artifacts
        run: |
          cd build/install
          tar -czvf ../../liblsl-armv7-ubuntu20.tar.gz .
          cd ../..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liblsl-armv7-ubuntu20
          path: liblsl-armv7-ubuntu20.tar.gz
